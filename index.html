<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Case Management SimulyasiyasДұ</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #16a34a;
      --green-light: #dcfce7;
      --green-mid: #86efac;
      --green-dark: #14532d;
      --neutral-50: #f8fafc;
      --neutral-100: #f1f5f9;
      --neutral-200: #e2e8f0;
      --neutral-400: #94a3b8;
      --neutral-500: #64748b;
      --neutral-700: #334155;
      --neutral-900: #0f172a;
      --red: #dc2626;
      --red-light: #fee2e2;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.05);
      --shadow-lg: 0 8px 32px rgba(0,0,0,.12);
      --radius: 14px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--neutral-50);
      color: var(--neutral-900);
      min-height: 100vh;
    }

    /* в”Җв”Җ LOGIN в”Җв”Җ */
    #login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 40%, #f0f9ff 100%);
    }

    .login-card {
      background: white;
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--neutral-200);
      animation: slideUp .4s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .login-icon {
      width: 64px; height: 64px;
      background: var(--green-light);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
      font-size: 28px;
    }

    .login-card h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 24px;
      text-align: center;
      color: var(--neutral-900);
      margin-bottom: 8px;
    }

    .login-card p {
      text-align: center;
      color: var(--neutral-500);
      font-size: 14px;
      margin-bottom: 32px;
    }

    /* в”Җв”Җ FORM ELEMENTS в”Җв”Җ */
    label.field-label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--neutral-500);
      margin-bottom: 6px;
    }

    input[type="text"], input[type="date"], textarea, select {
      width: 100%;
      padding: 11px 16px;
      border: 1.5px solid var(--neutral-200);
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--neutral-900);
      background: white;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }

    input[type="text"]:focus, input[type="date"]:focus, textarea:focus, select:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(22,163,74,.12);
    }

    textarea { resize: vertical; min-height: 80px; }

    .field-group { margin-bottom: 16px; }

    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 24px;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all .2s;
    }

    .btn-primary {
      background: var(--green);
      color: white;
      box-shadow: 0 4px 12px rgba(22,163,74,.3);
    }
    .btn-primary:hover { background: #15803d; transform: translateY(-1px); box-shadow: 0 6px 16px rgba(22,163,74,.35); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    .btn-ghost {
      background: transparent;
      color: var(--neutral-500);
    }
    .btn-ghost:hover { color: var(--neutral-900); }

    .btn-outline {
      background: white;
      color: var(--neutral-700);
      border: 1.5px solid var(--neutral-200);
    }
    .btn-outline:hover { border-color: var(--green); color: var(--green); }

    /* в”Җв”Җ HEADER в”Җв”Җ */
    header {
      background: white;
      border-bottom: 1px solid var(--neutral-200);
      position: sticky; top: 0; z-index: 100;
    }

    .header-inner {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 24px;
      height: 60px;
      display: flex; align-items: center; justify-content: space-between;
    }

    .header-brand {
      display: flex; align-items: center; gap: 10px;
      font-weight: 700; font-size: 15px;
    }

    .header-brand-icon {
      width: 32px; height: 32px;
      background: var(--green);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }

    .header-user {
      display: flex; align-items: center; gap: 12px;
    }

    .user-badge {
      display: flex; align-items: center; gap: 6px;
      background: var(--neutral-100);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
    }

    .logout-btn {
      background: none; border: none; cursor: pointer;
      color: var(--neutral-400);
      font-size: 18px;
      transition: color .2s;
    }
    .logout-btn:hover { color: var(--red); }

    /* в”Җв”Җ MAIN в”Җв”Җ */
    main { max-width: 900px; margin: 0 auto; padding: 32px 24px; }

    /* в”Җв”Җ STEPPER в”Җв”Җ */
    .stepper {
      display: flex; align-items: center;
      margin-bottom: 32px;
      overflow-x: auto;
      padding-bottom: 8px;
    }

    .step-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: none; cursor: pointer;
      font-weight: 700; font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      transition: all .2s;
      flex-shrink: 0;
    }

    .step-btn.active {
      background: var(--green); color: white;
      box-shadow: 0 4px 12px rgba(22,163,74,.35);
      transform: scale(1.1);
    }

    .step-btn.done {
      background: var(--green-light); color: var(--green);
    }

    .step-btn.pending {
      background: white; color: var(--neutral-400);
      border: 1.5px solid var(--neutral-200);
    }

    .step-line {
      flex: 1; height: 2px;
      margin: 0 6px;
      min-width: 24px;
    }
    .step-line.done { background: var(--green-mid); }
    .step-line.pending { background: var(--neutral-200); }

    /* в”Җв”Җ SECTION CARD в”Җв”Җ */
    .section-card {
      background: white;
      border-radius: var(--radius);
      border: 1px solid var(--neutral-200);
      box-shadow: var(--shadow);
      overflow: hidden;
      animation: fadeIn .3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(12px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .section-header {
      background: var(--neutral-50);
      border-bottom: 1px solid var(--neutral-200);
      padding: 16px 24px;
      display: flex; align-items: center; gap: 10px;
    }

    .section-header-icon { font-size: 20px; }

    .section-header h2 {
      font-size: 15px; font-weight: 700;
      color: var(--neutral-900);
    }

    .section-body { padding: 28px 24px; }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

    @media (max-width: 640px) {
      .grid-2, .grid-3 { grid-template-columns: 1fr; }
    }

    /* в”Җв”Җ CHECKBOX в”Җв”Җ */
    .checkbox-wrap {
      display: flex; align-items: center; gap: 10px;
      cursor: pointer; padding: 6px 0;
    }

    .checkbox-box {
      width: 20px; height: 20px;
      border-radius: 6px;
      border: 1.5px solid var(--neutral-200);
      background: white;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all .15s;
    }

    .checkbox-wrap input:checked ~ .checkbox-box,
    .checkbox-wrap.checked .checkbox-box {
      background: var(--green); border-color: var(--green);
    }

    .checkbox-wrap input { display: none; }
    .checkbox-label { font-size: 14px; color: var(--neutral-700); }

    /* в”Җв”Җ SUBSECTION TITLE в”Җв”Җ */
    .sub-title {
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .08em;
      color: var(--neutral-400);
      margin-bottom: 12px; margin-top: 8px;
    }

    /* в”Җв”Җ SWOT в”Җв”Җ */
    .swot-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    }

    .swot-cell {
      border-radius: 10px; padding: 12px;
      border: 1.5px solid;
    }

    .swot-cell.s { border-color: #86efac; background: #f0fdf4; }
    .swot-cell.w { border-color: #fca5a5; background: #fff5f5; }
    .swot-cell.o { border-color: #93c5fd; background: #eff6ff; }
    .swot-cell.t { border-color: #fcd34d; background: #fffbeb; }

    .swot-cell label { margin-bottom: 6px; }

    /* в”Җв”Җ SECTION FOOTER в”Җв”Җ */
    .section-footer {
      background: var(--neutral-50);
      border-top: 1px solid var(--neutral-200);
      padding: 16px 24px;
      display: flex; justify-content: space-between; align-items: center;
    }

    /* в”Җв”Җ NEEDS CHIPS в”Җв”Җ */
    .needs-grid {
      display: flex; flex-wrap: wrap; gap: 10px;
    }

    .need-chip {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 14px;
      border-radius: 20px;
      border: 1.5px solid var(--neutral-200);
      cursor: pointer;
      font-size: 13px; font-weight: 500;
      transition: all .15s;
      background: white;
    }

    .need-chip.active {
      border-color: var(--green);
      background: var(--green-light);
      color: var(--green-dark);
    }

    /* в”Җв”Җ CONFIRMATION BOX в”Җв”Җ */
    .confirm-box {
      background: var(--green-light);
      border: 1px solid var(--green-mid);
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 13px;
      color: var(--green-dark);
      margin-top: 8px;
    }

    /* в”Җв”Җ TOAST в”Җв”Җ */
    #toast {
      position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(80px);
      padding: 14px 24px;
      border-radius: 40px;
      font-size: 14px; font-weight: 600;
      display: flex; align-items: center; gap: 10px;
      box-shadow: var(--shadow-lg);
      z-index: 9999;
      transition: transform .35s cubic-bezier(.34,1.56,.64,1);
      white-space: nowrap;
    }

    #toast.show { transform: translateX(-50%) translateY(0); }
    #toast.success { background: var(--green); color: white; }
    #toast.error   { background: var(--red); color: white; }

    /* в”Җв”Җ TEACHER VIEW в”Җв”Җ */
    .teacher-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 24px;
    }

    .teacher-header h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 26px;
    }

    .submission-card {
      background: white;
      border: 1px solid var(--neutral-200);
      border-radius: var(--radius);
      padding: 20px 24px;
      margin-bottom: 12px;
      box-shadow: var(--shadow);
      transition: box-shadow .2s;
    }

    .submission-card:hover { box-shadow: var(--shadow-lg); }

    .submission-top {
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-bottom: 12px;
    }

    .submission-name { font-weight: 700; font-size: 16px; }
    .submission-time { font-size: 12px; color: var(--neutral-400); margin-top: 2px; }

    .badge-done {
      background: var(--green-light); color: var(--green-dark);
      padding: 4px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 700;
    }

    .submission-meta {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
    }

    .meta-item span {
      display: block; font-size: 10px;
      text-transform: uppercase; letter-spacing: .07em;
      color: var(--neutral-400); margin-bottom: 2px;
    }

    .meta-item p { font-size: 13px; color: var(--neutral-700); }

    .empty-state {
      background: white;
      border: 2px dashed var(--neutral-200);
      border-radius: var(--radius);
      padding: 60px;
      text-align: center;
      color: var(--neutral-400);
      font-size: 15px;
    }

    /* в”Җв”Җ HIDDEN в”Җв”Җ */
    .hidden { display: none !important; }

    /* в”Җв”Җ PDF download btn в”Җв”Җ */
    .btn-pdf {
      background: #1e40af;
      color: white;
      box-shadow: 0 4px 12px rgba(30,64,175,.25);
    }
    .btn-pdf:hover { background: #1d4ed8; transform: translateY(-1px); }
  </style>
</head>
<body>

<!-- в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ LOGIN в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ -->

  <div class="login-card">

      </button>

  </div>
</div>

<!-- в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ APP в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ -->
<div id="app-screen" class="hidden">

  <header>
    <div class="header-inner">
      <div class="header-brand">
        <div class="header-brand-icon">рҹ“Ӣ</div>
        <span class="hidden-sm">Case Management SimulyasiyasДұ</span>
      </div>
      <div class="header-user">
        <div class="user-badge">рҹ‘Ө <span id="display-name"></span></div>
        <button class="logout-btn" onclick="doLogout()" title="ГҮДұxДұЕҹ">вң•</button>
      </div>
    </div>
  </header>

  <main>

    <!-- STEPPER -->
    <div class="stepper" id="stepper"></div>

    <!-- SECTION CARD -->
    <div class="section-card" id="section-card">
      <div class="section-header">
        <span class="section-header-icon" id="sec-icon"></span>
        <h2 id="sec-title"></h2>
      </div>
      <div class="section-body" id="sec-body"></div>
      <div class="section-footer">
        <button class="btn btn-ghost" id="btn-prev" onclick="prevSection()">вҶҗ Geri</button>
        <button class="btn btn-primary" id="btn-next" onclick="nextSection()">Д°rЙҷli вҶ’</button>
        <button class="btn btn-primary hidden" id="btn-save" onclick="saveForm()">рҹ’ҫ Tamamla vЙҷ Saxla</button>
      </div>
    </div>

    <!-- TEACHER VIEW -->
    <div id="teacher-view" class="hidden">
      <div class="teacher-header">
        <h2>TЙҷlЙҷbЙҷ NЙҷticЙҷlЙҷri</h2>
        <button class="btn btn-outline" onclick="backToForm()">вҶҗ Formaya qayДұt</button>
      </div>
      <div id="submissions-list"></div>
    </div>

  </main>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// STATE
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
let studentName = '';
let currentSection = 1;
const TOTAL = 6;

const SECTIONS = [
  { icon: 'рҹ“„', title: 'I BГ–LMЖҸ: Д°DENTД°FД°KASД°YA VЖҸ HГңQUQД° DAД°RЖҸ' },
  { icon: 'рҹ‘ЁвҖҚрҹ‘©вҖҚрҹ‘§', title: 'II BГ–LMЖҸ: AД°LЖҸ DД°NAMД°KASI VЖҸ SOSД°AL ЕһЖҸBЖҸKЖҸ' },
  { icon: 'рҹ©ә', title: 'III BГ–LMЖҸ: TД°BBД° STATUS VЖҸ FUNKSД°ONAL Д°MKANLAR' },
  { icon: 'рҹҺ“', title: 'IV BГ–LMЖҸ: TЖҸHSД°L, MЖҸЕһДһULLUQ VЖҸ MALД°YYЖҸ VЖҸZД°YYЖҸTД°' },
  { icon: 'вҡ пёҸ', title: 'V BГ–LMЖҸ: MГңRACД°ЖҸT SЖҸBЖҸBД°, RД°SKLЖҸR VЖҸ GГ–ZLЖҸNTД°LЖҸR' },
  { icon: 'вң…', title: 'VI BГ–LMЖҸ: SOSД°AL Д°ЕһГҮД°NД°N YEKUN ANALД°ZД° (SWOT)' },
];

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// FORM DATA
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function getFormData() {
  return {
    protocolNo:      v('protocolNo'),
    date:            v('date'),
    specialist:      v('specialist'),
    fullName:        v('fullName'),
    fin:             v('fin'),
    birthDate:       v('birthDate'),
    gender:          v('gender'),
    idCard:          cb('idCard'),
    idCardSeries:    v('idCardSeries'),
    birthCert:       cb('birthCert'),
    marriageCert:    cb('marriageCert'),
    statusDoc:       cb('statusDoc'),
    section1Note:    v('section1Note'),
    familyMembers:   v('familyMembers'),
    decisionMaker:   v('decisionMaker'),
    legalDispute:    v('legalDispute'),
    supportPerson:   v('supportPerson'),
    livingEnv:       v('livingEnv'),
    section2Note:    v('section2Note'),
    diagnosis:       v('diagnosis'),
    hospitalized:    v('hospitalized'),
    selfCare:        v('selfCare'),
    devices:         v('devices'),
    mentalHealth:    v('mentalHealth'),
    section3Note:    v('section3Note'),
    education:       v('education'),
    incomeCovers:    v('incomeCovers'),
    debts:           v('debts'),
    workInterest:    v('workInterest'),
    talent:          v('talent'),
    section4Note:    v('section4Note'),
    trigger:         v('trigger'),
    riskSuicide:     v('riskSuicide'),
    riskHomeless:    v('riskHomeless'),
    riskAbandonment: v('riskAbandonment'),
    needDayCare:     chipActive('need-dayCare'),
    needShelter:     chipActive('need-shelter'),
    needPsycho:      chipActive('need-psycho'),
    needFinancial:   chipActive('need-financial'),
    needVocational:  chipActive('need-vocational'),
    section5Note:    v('section5Note'),

// STEPPER
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function renderStepper() {
  const el = document.getElementById('stepper');
  let html = '';
  for (let i = 1; i <= TOTAL; i++) {
    const cls = i === currentSection ? 'active' : i < currentSection ? 'done' : 'pending';
    html += `<button class="step-btn ${cls}" onclick="goSection(${i})">${i}</button>`;
    if (i < TOTAL) {
      html += `<div class="step-line ${i < currentSection ? 'done' : 'pending'}"></div>`;
    }
  }
  el.innerHTML = html;
}

function goSection(n) { currentSection = n; renderStepper(); renderSection(); }
function prevSection() { if (currentSection > 1) goSection(currentSection - 1); }
function nextSection() { if (currentSection < TOTAL) goSection(currentSection + 1); }

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// RENDER SECTION
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function renderSection() {
  const s = SECTIONS[currentSection - 1];
  document.getElementById('sec-icon').textContent = s.icon;
  document.getElementById('sec-title').textContent = s.title;
  document.getElementById('sec-body').innerHTML = getSectionHTML(currentSection);

  // prev/next buttons
  document.getElementById('btn-prev').disabled = currentSection === 1;
  const isLast = currentSection === TOTAL;
  document.getElementById('btn-next').classList.toggle('hidden', isLast);
  document.getElementById('btn-save').classList.toggle('hidden', !isLast);

  // Post-render init
  if (currentSection === 1) {
    const idCard = document.getElementById('idCard');
    const seriesRow = document.getElementById('idCardSeriesRow');
    idCard.addEventListener('change', () => {
      seriesRow.classList.toggle('hidden', !idCard.checked);
    });
  }

  if (currentSection === 5) {
    document.querySelectorAll('.need-chip').forEach(chip => {
      chip.addEventListener('click', () => chip.classList.toggle('active'));
    });
  }
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function saveForm() {
  const data = getFormData();
  const submission = {
    id: Date.now(),
    studentName,
    timestamp: new Date().toISOString(),
    formData: data,
  };

  // Save to localStorage
  const existing = JSON.parse(localStorage.getItem('submissions') || '[]');

  showToast('вң… MЙҷlumatlar saxlanДұldДұ! PDF yГјklЙҷnir...', 'success');
  setTimeout(() => generatePDF(submission), 800);
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// PDF GENERATION
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function generatePDF(submission) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
  const d = submission.formData;

  const W = 210, margin = 18;
  let y = 0;

  // Colors
  const GREEN = [22, 163, 74];
  const DARK  = [15, 23, 42];
  const GRAY  = [100, 116, 139];
  const LIGHT = [241, 245, 249];

  function addPage() {
    doc.addPage();
    y = margin;
    // subtle header line on new pages
    doc.setDrawColor(...GREEN);
    doc.setLineWidth(0.5);
    doc.line(margin, 8, W - margin, 8);
  }

  function checkY(need = 20) {
    if (y + need > 275) addPage();
  }

  function sectionHeader(title, icon = '') {
    checkY(18);
    doc.setFillColor(...GREEN);
    doc.roundedRect(margin, y, W - margin * 2, 10, 2, 2, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(9);
    doc.setFont('helvetica', 'bold');
    doc.text(`${icon}  ${title}`, margin + 4, y + 6.5);
    doc.setTextColor(...DARK);
    y += 14;
  }

  function row(label, value, indent = 0) {
    if (!value && value !== false) value = 'вҖ”';
    if (typeof value === 'boolean') value = value ? 'BЙҷli' : 'Xeyr';
    const lines = doc.splitTextToSize(String(value), W - margin * 2 - 55 - indent);
    const h = Math.max(8, lines.length * 5 + 3);
    checkY(h + 2);

    doc.setFillColor(...LIGHT);
    doc.roundedRect(margin + indent, y, W - margin * 2 - indent, h, 1.5, 1.5, 'F');

    doc.setTextColor(...GRAY);
    doc.setFontSize(7.5);
    doc.setFont('helvetica', 'bold');
    doc.text(label, margin + indent + 3, y + 5);

    doc.setTextColor(...DARK);
    doc.setFontSize(8.5);
    doc.setFont('helvetica', 'normal');
    doc.text(lines, margin + indent + 55, y + 5);

    y += h + 2;
  }

  function needsRow(label, active) {
    checkY(7);
    const color = active ? GREEN : [203, 213, 225];
    doc.setFillColor(...color);
    doc.circle(margin + 6, y + 3, 2.5, 'F');
    doc.setTextColor(active ? 15 : 148, active ? 23 : 163, active ? 42 : 174);
    doc.setFontSize(8.5);
    doc.setFont('helvetica', active ? 'bold' : 'normal');
    doc.text(label, margin + 11, y + 5);
    y += 7;
  }

  // в”Җв”Җ COVER в”Җв”Җ
  doc.setFillColor(...GREEN);
  doc.rect(0, 0, W, 52, 'F');

  doc.setTextColor(255, 255, 255);
  doc.setFontSize(18);
  doc.setFont('helvetica', 'bold');
  doc.text('Case Management SimulyasiyasДұ', margin, 22);

  doc.setFontSize(10);
  doc.setFont('helvetica', 'normal');
  doc.text('Sosial-Psixoloji QiymЙҷtlЙҷndirmЙҷ FormasДұ', margin, 31);

  doc.setFillColor(255, 255, 255, 0.2);
  doc.roundedRect(margin, 37, W - margin * 2, 10, 2, 2, 'F');
  doc.setTextColor(220, 252, 231);
  doc.setFontSize(9);
  doc.text(`TЙҷlЙҷbЙҷ: ${submission.studentName}`, margin + 4, 43.5);
  doc.text(`Tarix: ${new Date(submission.timestamp).toLocaleString('az-AZ')}`, W - margin - 4, 43.5, { align: 'right' });

  y = 60;
  doc.setTextColor(...DARK);

  // в”Җв”Җ SECTION 1 в”Җв”Җ
  sectionHeader('I BГ–LMЖҸ: Д°DENTД°FД°KASД°YA VЖҸ HГңQUQД° DAД°RЖҸ', 'рҹ“„');
  row('Protokol в„–', d.protocolNo);
  row('Tarix', d.date);
  row('MГјtЙҷxЙҷssis', d.specialist);
  row('Benefisiar', d.fullName);
  row('FД°N', d.fin);
  row('DoДҹum tarixi', d.birthDate);
  row('Cins', d.gender);
  row('ЕһЙҷxsiyyЙҷt vЙҷsiqЙҷsi', d.idCard);
  if (d.idCard) row('  Seriya', d.idCardSeries, 4);
  row('DoДҹum ЕҹЙҷhadЙҷtnamЙҷsi', d.birthCert);
  row('Nikah/Г–lГјm ЕҹЙҷhadЙҷtnamЙҷsi', d.marriageCert);
  row('Qazi/ЕһЙҷhid statusu', d.statusDoc);
  row('MГјtЙҷxЙҷssisin qeydi', d.section1Note);

  // в”Җв”Җ SECTION 2 в”Җв”Җ

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// TEACHER VIEW
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function renderSubmissions() {
  const list = document.getElementById('submissions-list');
  const subs = JSON.parse(localStorage.getItem('submissions') || '[]').reverse();

  if (subs.length === 0) {
    list.innerHTML = '<div class="empty-state">рҹ“ӯ HЙҷlЙҷ heГ§ bir nЙҷticЙҷ yoxdur.</div>';
    return;
  }

  list.innerHTML = subs.map(s => `
    <div class="submission-card">
      <div class="submission-top">
        <div>
          <div class="submission-name">${s.studentName}</div>
          <div class="submission-time">${new Date(s.timestamp).toLocaleString('az-AZ')}</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center;">
          <span class="badge-done">TamamlanДұb</span>
          <button class="btn btn-pdf" onclick='downloadExistingPDF(${JSON.stringify(s).replace(/'/g, "&#39;")})' style="padding:6px 14px;font-size:12px;">рҹ“„ PDF</button>
          <button class="btn btn-ghost" onclick="deleteSubmission(${s.id})" style="font-size:12px;color:var(--red)">рҹ—‘</button>
        </div>
      </div>
      <div class="submission-meta">
        <div class="meta-item"><span>Benefisiar</span><p>${s.formData.fullName || 'вҖ”'}</p></div>
        <div class="meta-item"><span>Protokol в„–</span><p>${s.formData.protocolNo || 'вҖ”'}</p></div>
        <div class="meta-item"><span>MГјtЙҷxЙҷssis</span><p>${s.formData.specialist || 'вҖ”'}</p></div>
        <div class="meta-item" style="grid-column:span 2"><span>Yekun RЙҷy</span><p style="font-style:italic;color:var(--neutral-500)">${s.formData.finalOpinion || 'RЙҷy yoxdur'}</p></div>
      </div>
    </div>
  `).join('');
}

function downloadExistingPDF(s) { generatePDF(s); }

function deleteSubmission(id) {
  if (!confirm('Bu nЙҷticЙҷni silmЙҷk istЙҷyirsiniz?')) return;
  const subs = JSON.parse(localStorage.getItem('submissions') || '[]').filter(s => s.id !== id);
  localStorage.setItem('submissions', JSON.stringify(subs));
  renderSubmissions();
  showToast('рҹ—‘ Silindi', 'error');
}

// TOAST
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `${type} show`;
  setTimeout(() => t.classList.remove('show'), 3000);
}
