<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Case Management Simulyasiyası</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body { font-family: Arial; }
  </style>
</head>

<body>

<script>
let FONT_LOADED = false;

// ─────────────────────────────
// FONT LOADER (UNICODE FIX)
// ─────────────────────────────
async function loadFont(doc) {
  const url = "https://raw.githubusercontent.com/google/fonts/main/ofl/notosans/NotoSans-Regular.ttf";

  const buffer = await fetch(url).then(r => r.arrayBuffer());

  let binary = "";
  const bytes = new Uint8Array(buffer);
  for (let i = 0; i < bytes.byteLength; i++) {
    binary += String.fromCharCode(bytes[i]);
  }
  const base64 = btoa(binary);

  doc.addFileToVFS("NotoSans.ttf", base64);
  doc.addFont("NotoSans.ttf", "NotoSans", "normal");

  FONT_LOADED = true;
}

// ─────────────────────────────
// PDF GENERATOR (FIXED)
// ─────────────────────────────
async function generatePDF(submission) {
  const { jsPDF } = window.jspdf;

  const doc = new jsPDF({
    orientation: "portrait",
    unit: "mm",
    format: "a4"
  });

  await loadFont(doc);

  doc.setFont("NotoSans");

  const d = submission.formData;

  const W = 210;
  const margin = 18;
  let y = 60;

  const GREEN = [22, 163, 74];
  const DARK = [15, 23, 42];
  const GRAY = [100, 116, 139];
  const LIGHT = [241, 245, 249];

  function safe(t) {
    return String(t || "").normalize("NFC");
  }

  function addPage() {
    doc.addPage();
    y = margin;
  }

  function checkY(h = 10) {
    if (y + h > 270) addPage();
  }

  function section(title) {
    checkY(12);

    doc.setFillColor(...GREEN);
    doc.roundedRect(margin, y, W - margin * 2, 10, 2, 2, "F");

    doc.setTextColor(255, 255, 255);
    doc.setFontSize(10);
    doc.text(safe(title), margin + 4, y + 6.5);

    y += 14;
  }

  function row(label, value) {
    value = value === true ? "Bəli" : value === false ? "Xeyr" : value;
    value = safe(value);

    const lines = doc.splitTextToSize(value || "—", 120);
    const h = lines.length * 6;

    checkY(h + 6);

    doc.setFillColor(...LIGHT);
    doc.roundedRect(margin, y, W - margin * 2, h + 6, 2, 2, "F");

    doc.setTextColor(...GRAY);
    doc.setFontSize(8);
    doc.text(label, margin + 3, y + 5);

    doc.setTextColor(...DARK);
    doc.text(lines, margin + 60, y + 5);

    y += h + 8;
  }

  // ───────── COVER ─────────
  doc.setFillColor(...GREEN);
  doc.rect(0, 0, W, 50, "F");

  doc.setTextColor(255, 255, 255);
  doc.setFontSize(16);
  doc.text("Case Management Simulyasiyası", margin, 25);

  doc.setFontSize(10);
  doc.text(`Tələbə: ${submission.studentName}`, margin, 40);

  doc.setTextColor(...DARK);

  // ───────── SECTIONS ─────────
  section("I BÖLMƏ: İDENTİFİKASİYA");
  row("Ad Soyad", d.fullName);
  row("FİN", d.fin);
  row("Tarix", d.date);
  row("Cins", d.gender);

  section("II BÖLMƏ: AİLƏ");
  row("Ailə üzvləri", d.familyMembers);
  row("Dəstək şəxs", d.supportPerson);

  section("III BÖLMƏ: SAĞLAMLIQ");
  row("Diaqnoz", d.diagnosis);
  row("Psixi vəziyyət", d.mentalHealth);

  section("IV BÖLMƏ: SOSİAL VƏZİYYƏT");
  row("Təhsil", d.education);
  row("Borclar", d.debts);

  section("V BÖLMƏ: RİSKLƏR");
  row("İntihar riski", d.riskSuicide);
  row("Evsizlik riski", d.riskHomeless);

  section("VI BÖLMƏ: SWOT");
  row("Güclü tərəflər", d.swotS);
  row("Zəif tərəflər", d.swotW);
  row("İmkanlar", d.swotO);
  row("Təhlükələr", d.swotT);

  row("Yekun rəy", d.finalOpinion);

  doc.save(`case-${submission.studentName}.pdf`);
}

// ───────── TEST BUTTON ─────────
function test() {
  generatePDF({
    studentName: "Test User",
    formData: {
      fullName: "Əli Məmmədov",
      fin: "7AB12CD",
      date: "2026-05-16",
      gender: "Kişi",
      familyMembers: "Ana, ata, 2 qardaş",
      supportPerson: "Ana",
      diagnosis: "Sağlam",
      mentalHealth: "Normal",
      education: "Ali təhsil",
      debts: "Yoxdur",
      riskSuicide: "Aşağı",
      riskHomeless: "Yox",
      swotS: "Güclü motivasiya",
      swotW: "Stress",
      swotO: "İş imkanları",
      swotT: "Maliyyə riskləri",
      finalOpinion: "Stabil sosial vəziyyət"
    }
  });
}

</script>

<button onclick="test()">PDF TEST</button>

</body>
</html>
